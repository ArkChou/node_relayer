events {
    worker_connections 1024;
}

http {
    upstream relayer_backend {
        # 负载均衡策略：least_conn（最少连接）
        least_conn;
        
        # Relayer 实例
        server relayer:9527 max_fails=3 fail_timeout=30s;
        server relayer:9528 max_fails=3 fail_timeout=30s;
        server relayer:9529 max_fails=3 fail_timeout=30s;
    }

    # 限流配置
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name _;

        # 请求体大小限制
        client_max_body_size 10M;

        # 健康检查端点（不限流）
        location /health {
            proxy_pass http://relayer_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # API 接口（限流）
        location /api/ {
            # 限流：每秒 10 个请求，突发 20 个
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://relayer_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 根路径
        location / {
            proxy_pass http://relayer_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}

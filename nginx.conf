events {
    worker_connections 1024;
}

http {
    upstream relayer_backend {
        # 负载均衡策略：least_conn（最少连接）
        least_conn;
        
        # Relayer 实例（容器内部端口都是 9525）
        server relayer-1:9525 max_fails=3 fail_timeout=30s;
        server relayer-2:9525 max_fails=3 fail_timeout=30s;
        server relayer-3:9525 max_fails=3 fail_timeout=30s;
    }

    # 限流配置（调整为 50 req/s，支持队列模式）
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;

    server {
        listen 80;
        server_name _;

        # 请求体大小限制
        client_max_body_size 10M;

        # 健康检查端点（不限流）
        location /health {
            proxy_pass http://relayer_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # API 接口（限流）
        location /api/ {
            # 限流：每秒 50 个请求，突发 100 个
            limit_req zone=api_limit burst=100 nodelay;

            proxy_pass http://relayer_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时设置（增加到 120 秒，防止 RPC 慢时超时）
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # 根路径
        location / {
            proxy_pass http://relayer_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}

version: '3.8'

services:
  # Redis 集群 - 3 个节点
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file /data/nodes.conf --cluster-node-timeout 5000 --appendonly yes --dir /data --cluster-announce-ip redis-node-1 --cluster-announce-port 6379 --cluster-announce-bus-port 16379 --requirepass ${REDIS_PASSWORD:-changeme} --masterauth ${REDIS_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:6379:6379"
      - "127.0.0.1:16379:16379"
    volumes:
      - redis-data-1:/data
    networks:
      - relayer-network
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file /data/nodes.conf --cluster-node-timeout 5000 --appendonly yes --dir /data --cluster-announce-ip redis-node-2 --cluster-announce-port 6379 --cluster-announce-bus-port 16379 --requirepass ${REDIS_PASSWORD:-changeme} --masterauth ${REDIS_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:6380:6379"
      - "127.0.0.1:16380:16379"
    volumes:
      - redis-data-2:/data
    networks:
      - relayer-network
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}

  redis-node-3:
    image: redis:7-alpine
    container_name: redis-node-3
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file /data/nodes.conf --cluster-node-timeout 5000 --appendonly yes --dir /data --cluster-announce-ip redis-node-3 --cluster-announce-port 6379 --cluster-announce-bus-port 16379 --requirepass ${REDIS_PASSWORD:-changeme} --masterauth ${REDIS_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:6381:6379"
      - "127.0.0.1:16381:16379"
    volumes:
      - redis-data-3:/data
    networks:
      - relayer-network
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}

  # Redis 集群初始化
  redis-cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    command:
      - sh
      - -c
      - |
        sleep 5
        redis-cli --cluster create redis-node-1:6379 redis-node-2:6379 redis-node-3:6379 --cluster-replicas 0 --cluster-yes -a $${REDIS_PASSWORD}
        echo '✅ Redis 集群初始化完成'
    networks:
      - relayer-network

  # Relayer 服务 - 3 个实例
  relayer-1:
    build: .
    container_name: relayer-1
    environment:
      - PRIVATE_KEY=${PRIVATE_KEY}
      - REDIS_CLUSTER_NODES=redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    depends_on:
      - redis-cluster-init
    networks:
      - relayer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9525/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  relayer-2:
    build: .
    container_name: relayer-2
    environment:
      - PRIVATE_KEY=${PRIVATE_KEY}
      - REDIS_CLUSTER_NODES=redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    depends_on:
      - redis-cluster-init
    networks:
      - relayer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9525/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  relayer-3:
    build: .
    container_name: relayer-3
    environment:
      - PRIVATE_KEY=${PRIVATE_KEY}
      - REDIS_CLUSTER_NODES=redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    depends_on:
      - redis-cluster-init
    networks:
      - relayer-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9525/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Nginx 负载均衡
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "9525:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - relayer-1
      - relayer-2
      - relayer-3
    networks:
      - relayer-network
    restart: unless-stopped

volumes:
  redis-data-1:
  redis-data-2:
  redis-data-3:

networks:
  relayer-network:
    driver: bridge

version: '3.8'

services:
  # Redis 集群 - 3 个节点
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file /data/nodes.conf --cluster-node-timeout 5000 --appendonly yes --dir /data --cluster-announce-ip redis-node-1 --cluster-announce-port 6379 --cluster-announce-bus-port 16379
    ports:
      - "6379:6379"
      - "16379:16379"
    volumes:
      - redis-data-1:/data
    networks:
      - relayer-network

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file /data/nodes.conf --cluster-node-timeout 5000 --appendonly yes --dir /data --cluster-announce-ip redis-node-2 --cluster-announce-port 6379 --cluster-announce-bus-port 16379
    ports:
      - "6380:6379"
      - "16380:16379"
    volumes:
      - redis-data-2:/data
    networks:
      - relayer-network

  redis-node-3:
    image: redis:7-alpine
    container_name: redis-node-3
    command: redis-server --port 6379 --cluster-enabled yes --cluster-config-file /data/nodes.conf --cluster-node-timeout 5000 --appendonly yes --dir /data --cluster-announce-ip redis-node-3 --cluster-announce-port 6379 --cluster-announce-bus-port 16379
    ports:
      - "6381:6379"
      - "16381:16379"
    volumes:
      - redis-data-3:/data
    networks:
      - relayer-network

  # Redis 集群初始化
  redis-cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
    command:
      - sh
      - -c
      - |
        sleep 5
        redis-cli --cluster create redis-node-1:6379 redis-node-2:6379 redis-node-3:6379 --cluster-replicas 0 --cluster-yes
        echo '✅ Redis 集群初始化完成'
    networks:
      - relayer-network

  # Relayer 服务 - 3 个实例
  relayer-1:
    build: .
    container_name: relayer-1
    environment:
      - PRIVATE_KEY=${PRIVATE_KEY}
      - REDIS_CLUSTER_NODES=redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
    depends_on:
      - redis-cluster-init
    networks:
      - relayer-network
    restart: unless-stopped

  relayer-2:
    build: .
    container_name: relayer-2
    environment:
      - PRIVATE_KEY=${PRIVATE_KEY}
      - REDIS_CLUSTER_NODES=redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
    depends_on:
      - redis-cluster-init
    networks:
      - relayer-network
    restart: unless-stopped

  relayer-3:
    build: .
    container_name: relayer-3
    environment:
      - PRIVATE_KEY=${PRIVATE_KEY}
      - REDIS_CLUSTER_NODES=redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
    depends_on:
      - redis-cluster-init
    networks:
      - relayer-network
    restart: unless-stopped

  # Nginx 负载均衡
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - relayer-1
      - relayer-2
      - relayer-3
    networks:
      - relayer-network
    restart: unless-stopped

volumes:
  redis-data-1:
  redis-data-2:
  redis-data-3:

networks:
  relayer-network:
    driver: bridge
